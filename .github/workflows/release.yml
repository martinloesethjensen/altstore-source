name: Update AltStore Source
on:
  release:
    types: [published]

jobs:
  update-source:
    runs-on: ubuntu-latest
    permissions:
      # Required for the bot to commit and push changes back to the repo
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          # Ensure we fetch the latest changes
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Extract Release Info
        id: info
        run: |
          # This workflow relies on the filename of the FIRST asset uploaded to the release.
          # It assumes the filename matches your app's name, e.g., GenkiFlow.ipa.
          ASSET_URL="${{ github.event.release.assets[0].browser_download_url }}"
          FILENAME=$(basename "$ASSET_URL")
          # Extract the name without the extension (e.g., 'GenkiFlow')
          APP_NAME=$(echo "$FILENAME" | cut -f 1 -d '.')

          # Construct the full bundleIdentifier. This MUST match your apps.json.
          # Example: GenkiFlow.ipa -> dev.martin.GenkiFlow
          echo "bundle_id=dev.martin.$APP_NAME" >> $GITHUB_OUTPUT
          echo "url=$ASSET_URL" >> $GITHUB_OUTPUT
          echo "size=${{ github.event.release.assets[0].size }}" >> $GITHUB_OUTPUT
          echo "tag=${{ github.event.release.tag_name }}" >> $GITHUB_OUTPUT

      - name: Run Update Script
        run: |
          # Call the updated Python script with extracted information
          python .github/scripts/update_json.py \
          "${{ steps.info.outputs.bundle_id }}" \
          "${{ steps.info.outputs.tag }}" \
          "${{ steps.info.outputs.url }}" \
          "${{ steps.info.outputs.size }}"

      - name: Commit and Push Changes
        run: |
          # Configure git to use the GitHub Actions bot identity
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Add the modified apps.json file
          git add apps.json

          # Commit the changes. The [skip ci] tag prevents this commit from triggering another run.
          git commit -m "AltStore: Release ${{ steps.info.outputs.tag }} for ${{ steps.info.outputs.bundle_id }} [skip ci]"

          # Push the commit back to the repository
          git push
